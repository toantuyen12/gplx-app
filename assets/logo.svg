<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <!-- Shield Background -->
  <path d="M50 5 L90 20 L90 45 C90 70 70 90 50 95 C30 90 10 70 10 45 L10 20 Z" fill="#4f46e5" />
  
  <!-- Outer Steering Wheel Ring -->
  <circle cx="50" cy="48" r="28" fill="none" stroke="#ffffff" stroke-width="6" />
  
  <!-- Center Horn/Wheel Cap -->
  <circle cx="50" cy="48" r="7" fill="#ffffff" />
  
  <!-- Steering Wheel Spokes -->
  <!-- Left spoke -->
  <line x1="28" y1="48" x2="43" y2="48" stroke="#ffffff" stroke-width="6" stroke-linecap="round"/>
  <!-- Right spoke -->
  <line x1="72" y1="48" x2="57" y2="48" stroke="#ffffff" stroke-width="6" stroke-linecap="round"/>
  <!-- Bottom spoke -->
  <line x1="50" y1="70" x2="50" y2="55" stroke="#ffffff" stroke-width="6" stroke-linecap="round"/>
</svg>
